# ═══════════════════════════════════════════════════════════════
#  NORTH POINTE CAPITAL — GitHub Pages Dashboard Hosting
#  Hosts your dashboard at:
#  https://YOUR-USERNAME.github.io/north-pointe-capital
#  Updates automatically every time you push a new dashboard.html
# ═══════════════════════════════════════════════════════════════

name: North Pointe Capital — Deploy Dashboard

on:
  push:
    branches: [ main, master ]
    paths:
      - 'dashboard.html'
      - 'trades.json'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy to GitHub Pages
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Prepare dashboard
        run: |
          mkdir -p _site
          cp dashboard.html _site/index.html
          cp trades.json _site/trades.json 2>/dev/null || echo '{"trades":[],"positions":[],"log":[],"cash":200,"tick":0}' > _site/trades.json
          echo "✓ Dashboard ready for deployment"

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '_site'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

